async function saveRoom(state) {
  if (!sb) return;
  state.updated_at = new Date().toISOString();
  const { error: e } = await sb.from('game_rooms').upsert({ code: state.roomCode, state: state, updated_at: state.updated_at });
  if (e) console.error('Save error:', e);
}

  if (!sb) return null;
  const { data, error: e } = await sb.from('game_rooms').select('state').eq('code', code).single();
  if (e || !data) return null;
  return data.state;
}

function subscribeToRoom(code) {
  if (subscription) subscription.unsubscribe();
  subscription = sb.channel(`room-${code}`)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'game_rooms', filter: `code=eq.${code}` }, (payload) => {
      if (payload.new && payload.new.state) {
        room = payload.new.state;
        render();
      }
    })
    .subscribe();
}

// ═══════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════
function genCode() {
  const c = "ABCDEFGHJKLMNPQRSTUVWXYZ";
  return Array.from({length:4}, () => c[Math.floor(Math.random()*c.length)]).join('');
}
function shuffle(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]} return b; }
const FISH_EMOJI = ["🐟","🐡","🦈","🐠","🐙","🦑","🦀","🐳","🐋","🦞"];

function setupRound(r) {
  const ri = r.currentRaterIndex % r.players.length;
  const nonR = r.players.filter((_,i) => i !== ri);
  const bi = Math.floor(Math.random() * nonR.length);
  const fa = {};
  nonR.forEach((p,i) => fa[p.id] = i === bi ? 'blue' : 'red');
  r.phase='answering'; r.currentRaterIndex=ri; r.bluePlayerId=nonR[bi].id;
  r.fishAssign=fa; r.answers={}; r.answerOrder=[]; r.flipped=[]; r.revealedAnswer=false;
}

// ═══════════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════════
async function doCreateRoom() {
  const n = document.getElementById('nameInput')?.value?.trim();
  if (!n) { error='Name eingeben!'; render(); return; }
  myName = n; localStorage.setItem('rv_name', n);
  const code = genCode();
  room = {
    roomCode:code, hostId:myId, players:[{id:myId,name:n,score:0}],
    phase:'lobby', currentRaterIndex:0, currentQuestionIndex:0,
    questionOrder:shuffle(QS.map((_,i)=>i)), answers:{}, answerOrder:[],
    flipped:[], bluePlayerId:null, fishAssign:{}, roundsPlayed:0, maxRounds
  };
  await saveRoom(room);
  subscribeToRoom(code);
  screen='lobby'; error=''; render();
}

async function doJoinRoom() {
  const n = document.getElementById('nameInput')?.value?.trim();
  const c = document.getElementById('codeInput')?.value?.trim()?.toUpperCase();
  if (!n||!c) { error='Name und Code eingeben!'; render(); return; }
  myName = n; localStorage.setItem('rv_name', n);
  const r = await loadRoom(c);
  if (!r) { error='Raum nicht gefunden!'; render(); return; }
  if (r.phase !== 'lobby') { error='Spiel läuft schon!'; render(); return; }
  if (!r.players.find(p=>p.id===myId)) {
    if (r.players.length>=10) { error='Raum voll!'; render(); return; }
    r.players.push({id:myId,name:n,score:0});
    await saveRoom(r);
  }
  room = r; subscribeToRoom(c);
  screen='lobby'; error=''; render();
}

async function doStartGame() {
  if (!room||room.players.length<3) { error='Mindestens 3 Spieler!'; render(); return; }
  room.maxRounds = maxRounds;
  setupRound(room);
  await saveRoom(room); render();
}

async function doSubmitAnswer() {
  const a = document.getElementById('answerInput')?.value?.trim();
  if (!a) return;
  const r = await loadRoom(room.roomCode);
  r.answers[myId] = a;
  const rater = r.players[r.currentRaterIndex];
  const nonR = r.players.filter(p=>p.id!==rater.id);
  if (nonR.every(p=>r.answers[p.id])) { r.answerOrder=shuffle(nonR.map(p=>p.id)); r.phase='guessing'; }
  await saveRoom(r); room=r; submitted=true; myAnswer=''; render();
}

async function doFlip(pid) {
  const r = await loadRoom(room.roomCode);
  if (r.flipped.includes(pid)) return;
  r.flipped.push(pid);
  if (pid===r.bluePlayerId) {
    r.phase='roundEnd'; r.revealedAnswer=true;
  } else {
    const rater=r.players[r.currentRaterIndex];
    const reds=r.players.filter(p=>p.id!==rater.id&&p.id!==r.bluePlayerId);
    // Points for surviving reds and blue
    const survivingRed=reds.filter(p=>!r.flipped.includes(p.id));
    survivingRed.forEach(p=>{ const pl=r.players.find(x=>x.id===p.id); if(pl)pl.score+=1; });
    const bp=r.players.find(p=>p.id===r.bluePlayerId); if(bp)bp.score+=1;
    if(reds.every(p=>r.flipped.includes(p.id))) {
      const rp=r.players.find(p=>p.id===rater.id); if(rp)rp.score+=reds.length;
      r.phase='roundEnd'; r.revealedAnswer=true;
    }
  }
  await saveRoom(r); room=r; render();
}

async function doNextRound() {
  const r = await loadRoom(room.roomCode);
  r.roundsPlayed++; r.currentQuestionIndex++; r.currentRaterIndex=(r.currentRaterIndex+1)%r.players.length;
  if (r.roundsPlayed>=r.maxRounds||r.currentQuestionIndex>=r.questionOrder.length) { r.phase='gameOver'; }
  else setupRound(r);
  await saveRoom(r); room=r; submitted=false; render();
}

async function doRestart() {
  const r = await loadRoom(room.roomCode);
  r.players.forEach(p=>p.score=0); r.roundsPlayed=0; r.currentRaterIndex=0; r.currentQuestionIndex=0;
  r.questionOrder=shuffle(QS.map((_,i)=>i)); r.phase='lobby';
  await saveRoom(r); room=r; submitted=false; render();
}

// ═══════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  const me = room?.players?.find(p=>p.id===myId);
  const isHost = room?.hostId===myId;
  const isRater = room ? room.players[room.currentRaterIndex]?.id===myId : false;
  const Q = room ? QS[room.questionOrder[room.currentQuestionIndex]] : null;
  const myFish = room?.fishAssign?.[myId];

  // ── HOME ──
  if (screen==='home') {
    app.innerHTML = `
      <div class="center mt-24"><div class="emoji-big">🐟</div>
      <h1 style="font-size:28px;font-weight:900;letter-spacing:-1px">RIECHT<br/>VERDÄCHTIG</h1>
      <p style="color:var(--teal);font-size:13px;margin-top:8px;font-weight:600;letter-spacing:2px">DAS BLUFF-SPIEL</p></div>
      <div class="card" style="margin-top:20px">
        <input id="nameInput" placeholder="Dein Name" value="${myName}" maxlength="20"/>
        ${error?`<p class="error">${error}</p>`:''}
        <button class="btn btn-teal" onclick="goCreate()">Spiel erstellen</button>
        <div class="divider"><div class="divider-line"></div><span class="divider-text">ODER</span><div class="divider-line"></div></div>
        <input id="codeInput" class="code-input" placeholder="CODE" maxlength="4"/>
        <button class="btn btn-blue" onclick="doJoinRoom()">Beitreten</button>
      </div>
      <p class="tiny center" style="color:#ffffff33;margin-top:24px">Privates Spiel · Inspiriert von Big Potato Games</p>`;
    return;
  }

  // ── CREATE SETTINGS ──
  if (screen==='create') {
    const rndBtns = [4,6,8,10,12].map(n=>`<button onclick="maxRounds=${n};render()" style="width:44px;height:44px;border-radius:10px;border:none;font-size:16px;font-weight:800;background:${maxRounds===n?'var(--teal)':'var(--surface)'};color:var(--white);cursor:pointer;font-family:inherit">${n}</button>`).join('');
    app.innerHTML = `
      <div class="center mt-32"><div class="emoji-med">⚙️</div><h2 style="font-size:22px;font-weight:800;margin:12px 0">Einstellungen</h2></div>
      <div class="card">
        <label class="small" style="font-weight:700;color:var(--teal)">Rundenanzahl</label>
        <div style="display:flex;gap:12px;margin-top:8px">${rndBtns}</div>
        <button class="btn btn-teal" onclick="doCreateRoom()">Raum erstellen →</button>
        <button class="btn btn-surface" onclick="screen='home';render()">← Zurück</button>
      </div>`;
    return;
  }

  if (!room) { app.innerHTML = '<p class="center mt-32 pulse">Lade...</p>'; return; }

  // ── LOBBY ──
  if (room.phase==='lobby') {
    const rows = room.players.map((p,i)=>`
      <div class="player-row" style="${p.id===myId?'background:#1abc9c22':''}">
        <span style="font-size:22px">${FISH_EMOJI[i]||'🐟'}</span>
        <span style="font-weight:700;flex:1">${p.name}${p.id===myId?' (du)':''}</span>
        ${p.id===room.hostId?'<span class="tag" style="background:var(--gold);color:var(--ocean)">HOST</span>':''}
      </div>`).join('');
    const startBtn = isHost && room.players.length>=3 ? `<button class="btn btn-teal" onclick="doStartGame()">Spiel starten! 🎣</button>` :
      isHost ? `<p class="small center error" style="margin-top:12px">Mindestens 3 Spieler nötig</p>` :
      `<p class="small center muted" style="margin-top:12px">Warte auf den Host...</p>`;
    app.innerHTML = `
      <div class="center mt-32">
        <div class="label" style="color:var(--teal)">RAUM-CODE</div>
        <div style="font-size:48px;font-weight:900;letter-spacing:12px;margin:8px 0;color:var(--gold);text-shadow:0 0 24px #f1c40f44">${room.roomCode}</div>
        <p class="small muted">Teile diesen Code mit deinen Freunden</p></div>
      <div class="card mt-16">
        <div class="small mb-12" style="font-weight:700;color:var(--teal)">SPIELER (${room.players.length}/10)</div>
        ${rows}${startBtn}
      </div>`;
    return;
  }

  // ── ANSWERING ──
  if (room.phase==='answering') {
    const rater = room.players[room.currentRaterIndex];
    const nonR = room.players.filter(p=>p.id!==rater.id);
    const answered = nonR.filter(p=>room.answers[p.id]).length;

    if (isRater) {
      const chips = nonR.map(p=>`<div class="chip" style="background:${room.answers[p.id]?'#1abc9c33':'var(--surface)'};color:${room.answers[p.id]?'var(--teal)':'#ffffff44'}">${p.name} ${room.answers[p.id]?'✓':'...'}</div>`).join('');
      app.innerHTML = `
        <div class="center mt-24"><div class="label" style="color:var(--gold)">DU BIST DER RATER</div><div class="emoji-med">🔍</div></div>
        <div class="card" style="background:linear-gradient(135deg,var(--card),var(--surface))">
          <div class="small mb-8" style="font-weight:700;color:var(--teal)">FRAGE #${room.roundsPlayed+1}</div>
          <p style="font-size:18px;font-weight:700;line-height:1.4">${Q?.q}</p></div>
        <div class="card mt-12"><div class="small muted center">Warte auf Antworten... ${answered}/${nonR.length}</div>
        <div class="status-dot">${chips}</div></div>`;
    } else {
      const done = submitted || room.answers[myId];
      const col = myFish==='blue' ? 'var(--blue)' : 'var(--red)';
      app.innerHTML = `
        <div class="center mt-24"><div class="label" style="color:${col}">${myFish==='blue'?'🐟 DU BIST DER ECHTE HERING':'🐡 DU BIST EIN ROTER HERING'}</div>
        <div style="font-size:36px;margin:8px 0">${myFish==='blue'?'🐟':'🐡'}</div></div>
        <div class="card" style="border-color:${col}44">
          <div class="small mb-8" style="font-weight:700;color:var(--teal)">FRAGE</div>
          <p style="font-size:17px;font-weight:700;line-height:1.4;margin-bottom:12px">${Q?.q}</p>
          <div class="answer-box" style="background:${myFish==='blue'?'#3498db22':'#e74c3c22'}">
            <div class="tiny" style="font-weight:700;color:${col};margin-bottom:4px">${myFish==='blue'?'✅ RICHTIGE ANTWORT – gib sie so wieder!':'❌ DENK DIR ETWAS AUS!'}</div>
            ${myFish==='blue'?`<p style="font-size:15px;font-weight:700;color:var(--gold)">${Q?.a}</p>`:`<p class="small muted">Erfinde eine glaubwürdige Antwort!</p>`}
          </div>
          ${!done?`<input id="answerInput" placeholder="${myFish==='blue'?'Tippe die richtige Antwort...':'Deine erfundene Antwort...'}" maxlength="120"/>
            <button class="btn ${myFish==='blue'?'btn-blue':'btn-red'}" onclick="doSubmitAnswer()">Antwort abgeben</button>`
            :`<div class="center" style="padding:16px;color:var(--teal);font-weight:700">✓ Abgegeben! Warte...</div>`}
        </div>`;
    }
    return;
  }

  // ── GUESSING ──
  if (room.phase==='guessing') {
    const rater = room.players[room.currentRaterIndex];
    const btns = room.answerOrder.map(pid => {
      const p = room.players.find(x=>x.id===pid);
      const fl = room.flipped.includes(pid);
      const isRed = fl && pid!==room.bluePlayerId;
      const isBlue = fl && pid===room.bluePlayerId;
      const cls = isBlue?'flipped-blue':isRed?'flipped-red':'';
      const icon = fl?(isBlue?'🐟':'🐡'):'❓';
      const tag = isRed?'<span class="fish-badge" style="background:var(--red)">FAKE</span>':isBlue?'<span class="fish-badge" style="background:var(--blue)">ECHT</span>':'';
      return `<button class="answer-btn ${cls}" ${fl||!isRater?'disabled':''} onclick="doFlip('${pid}')">
        <span style="font-size:24px;min-width:32px">${icon}</span>
        <div style="flex:1"><div style="font-weight:700">${p?.name}${pid===myId?' (du)':''}</div><div class="small" style="color:#ffffffcc;margin-top:2px">„${room.answers[pid]}"</div></div>${tag}</button>`;
    }).join('');

    app.innerHTML = `
      <div class="center mt-24">
        <div class="label" style="color:var(--gold)">${isRater?'FINDE DIE ROTEN HERINGE!':rater?.name+' rät jetzt...'}</div>
        ${isRater?'<div class="small muted" style="margin-top:4px">Tippe auf die Antwort, die du für FALSCH hältst</div>':'<div style="font-size:36px;margin:8px 0">'+(myFish==='blue'?'🐟':'🐡')+'</div>'}
      </div>
      <div class="card mt-16">
        <p style="font-size:16px;font-weight:700;margin-bottom:16px;color:var(--teal)">${Q?.q}</p>
        ${btns}
      </div>`;
    return;
  }

  // ── ROUND END ──
  if (room.phase==='roundEnd') {
    const rater = room.players[room.currentRaterIndex];
    const bp = room.players.find(p=>p.id===room.bluePlayerId);
    const blueFlipped = room.flipped.includes(room.bluePlayerId);
    const sorted = [...room.players].sort((a,b)=>b.score-a.score);
    const rows = sorted.map((p,i)=>`
      <div class="score-row" style="${i===0?'background:#f1c40f15':''}">
        <span style="font-weight:900;font-size:16px;color:${i===0?'var(--gold)':'#ffffff44'};min-width:24px">${i+1}.</span>
        <span style="flex:1;font-weight:600">${p.name}${p.id===myId?' (du)':''}</span>
        <span style="font-weight:900;font-size:18px;color:var(--gold)">${p.score}</span>
      </div>`).join('');

    app.innerHTML = `
      <div class="center mt-24"><div style="font-size:44px">${blueFlipped?'💥':'🎯'}</div>
      <h2 style="font-size:20px;font-weight:800;margin:8px 0">${blueFlipped?rater?.name+' hat den echten Hering erwischt!':rater?.name+' hat alle Fälscher entlarvt!'}</h2></div>
      <div class="card mt-12">
        <div class="small mb-8" style="font-weight:700;color:var(--teal)">RICHTIGE ANTWORT</div>
        <p style="font-size:17px;font-weight:700;color:var(--gold);margin-bottom:4px">${Q?.a}</p>
        <p class="small muted">Blauer Hering: ${bp?.name}</p></div>
      <div class="card mt-12">
        <div class="small mb-8" style="font-weight:700;color:var(--teal)">PUNKTESTAND (Runde ${room.roundsPlayed+1}/${room.maxRounds})</div>
        ${rows}</div>
      ${isHost?`<button class="btn btn-teal" style="max-width:400px;margin-top:12px" onclick="doNextRound()">${room.roundsPlayed+1>=room.maxRounds?'Ergebnis anzeigen →':'Nächste Runde →'}</button>`
        :`<p class="small muted center mt-16">Host startet nächste Runde...</p>`}`;
    return;
  }

  // ── GAME OVER ──
  if (room.phase==='gameOver') {
    const sorted = [...room.players].sort((a,b)=>b.score-a.score);
    const medals = ['🥇','🥈','🥉'];
    const rows = sorted.map((p,i)=>`
      <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;margin-bottom:6px;${i===0?'background:#f1c40f22;border:1px solid #f1c40f44':i<3?'background:#1abc9c11':''}">
        <span style="font-size:28px;min-width:36px;text-align:center">${medals[i]||(i+1)+'.'}</span>
        <span style="flex:1;font-weight:700;font-size:16px">${p.name}${p.id===myId?' (du)':''}</span>
        <span style="font-weight:900;font-size:22px;color:var(--gold)">${p.score}</span>
      </div>`).join('');

    app.innerHTML = `
      <div class="center mt-32"><div style="font-size:56px">🏆</div>
      <h1 style="font-size:26px;font-weight:900;margin:8px 0">Spiel vorbei!</h1>
      <p style="color:var(--gold);font-weight:700;font-size:18px">${sorted[0]?.name} gewinnt!</p></div>
      <div class="card mt-16">${rows}</div>
      ${isHost?`<button class="btn btn-teal" style="max-width:400px;margin-top:16px" onclick="doRestart()">🔄 Nochmal spielen</button>`:''}`;
    return;
  }

  app.innerHTML = '<p class="center mt-32 pulse">Lade...</p>';
}

// ═══════════════════════════════════════════════════════════════════
// GLOBAL HANDLERS
// ═══════════════════════════════════════════════════════════════════
window.goCreate = () => {
  const n = document.getElementById('nameInput')?.value?.trim();
  if (!n) { error='Name eingeben!'; render(); return; }
  myName = n; localStorage.setItem('rv_name', n);
  screen='create'; error=''; render();
};
window.doCreateRoom = doCreateRoom;
window.doJoinRoom = doJoinRoom;
window.doStartGame = doStartGame;
window.doSubmitAnswer = doSubmitAnswer;
window.doFlip = doFlip;
window.doNextRound = doNextRound;
window.doRestart = doRestart;
window.maxRounds = maxRounds;

// ── INIT ──
initSupabase();
render();
</script>
</body>
