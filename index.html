<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Schwindelfisch</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ocean:#0B1D3A;--deep:#132D5E;--teal:#1ABC9C;--red:#E74C3C;--gold:#F1C40F;--white:#ECF0F1;--blue:#3498DB;--card:#162A50;--surface:#1A3260}
body{font-family:'Nunito',sans-serif;background:linear-gradient(180deg,var(--ocean),var(--deep),#0a1628);color:var(--white);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:16px;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
.card{background:var(--card);border-radius:16px;padding:20px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.4);border:1px solid var(--surface)}
.btn{border:none;border-radius:12px;padding:14px 24px;font-size:16px;font-weight:700;cursor:pointer;width:100%;margin-top:10px;font-family:inherit;color:#fff;transition:transform .1s,opacity .15s}
.btn:active{transform:scale(.97);opacity:.9}
.btn-teal{background:var(--teal);box-shadow:0 4px 16px #1abc9c44}
.btn-blue{background:var(--blue);box-shadow:0 4px 16px #3498db44}
.btn-red{background:var(--red);box-shadow:0 4px 16px #e74c3c44}
.btn-gold{background:var(--gold);color:var(--ocean);box-shadow:0 4px 16px #f1c40f44}
.btn-surface{background:var(--surface);box-shadow:none}
.btn:disabled{opacity:.5;cursor:default;transform:none}
input,.textarea{background:var(--surface);border:1px solid #1abc9c44;border-radius:10px;padding:12px 16px;font-size:16px;color:var(--white);width:100%;font-family:inherit;outline:none}
input:focus,.textarea:focus{border-color:var(--teal)}
.code-input{text-align:center;letter-spacing:8px;font-size:24px;font-weight:900;text-transform:uppercase}
.tag{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:800;display:inline-block}
.divider{display:flex;align-items:center;gap:12px;margin:16px 0}
.divider-line{flex:1;height:1px;background:var(--surface)}
.divider-text{color:var(--teal);font-size:13px;font-weight:700}
.player-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:4px}
.answer-btn{display:flex;align-items:center;gap:12px;width:100%;padding:14px 16px;margin-bottom:8px;border-radius:12px;border:1px solid #1abc9c44;background:var(--surface);cursor:pointer;text-align:left;font-family:inherit;color:var(--white);font-size:15px;transition:all .3s}
.answer-btn:disabled{cursor:default}
.answer-btn.flipped-red{background:#e74c3c22;border-color:transparent;opacity:.7}
.answer-btn.flipped-blue{background:#3498db33;border-color:transparent;opacity:.7}
.score-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;margin-bottom:4px}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.fade-in{animation:fadeIn .3s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.center{text-align:center}
.mt-24{margin-top:24px}
.mt-12{margin-top:12px}
.mt-16{margin-top:16px}
.mt-32{margin-top:32px}
.mb-8{margin-bottom:8px}
.mb-12{margin-bottom:12px}
.mb-16{margin-bottom:16px}
.small{font-size:13px}
.tiny{font-size:11px}
.muted{color:#ffffff88}
.error{color:var(--red);font-size:13px;margin-top:8px}
.fish-badge{font-size:12px;padding:2px 8px;border-radius:6px;font-weight:700;color:#fff}
.status-dot{display:inline-flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:12px}
.status-dot .chip{padding:6px 12px;border-radius:8px;font-size:13px;font-weight:600}
.emoji-big{font-size:56px;margin-bottom:8px}
.emoji-med{font-size:40px;margin:8px 0}
.label{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.answer-box{border-radius:10px;padding:12px;margin-bottom:12px}
.hidden{display:none}
.game-header{width:100%;max-width:400px;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:rgba(255,255,255,0.05);border-radius:12px;margin-bottom:16px;border:1px solid rgba(255,255,255,0.1)}
.game-footer{width:100%;max-width:400px;margin-top:auto;padding:24px 0 12px;text-align:center;border-top:1px solid rgba(255,255,255,0.1)}
.beta-list{font-size:10px;color:rgba(255,255,255,0.3);line-height:1.6;font-weight:600;text-transform:uppercase;letter-spacing:1px}
</style>
</head>
<body>

<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
// QUESTIONS
// ═══════════════════════════════════════════════════════════════════
const QS=[
{q:"Was benutzt der Seeotter als Werkzeug, um Schalentiere zu knacken?",a:"Einen flachen Stein"},
{q:"Welche Farbe verbirgt sich oft im Maul einer Giraffe?",a:"Bläulich-schwarz (die Zunge)"},
{q:"Was trinken manche Schmetterlinge gelegentlich als salzigen Snack?",a:"Die Tränen von Schildkröten"},
{q:"Was schwitzen Nilpferde, um ihre Haut in der prallen Sonne zu schützen?",a:"Eine rötliche Flüssigkeit als natürlichen Sonnenschutz"},
{q:"Wieso haben Zebras tatsächlich ihre auffälligen Streifen?",a:"Um lästige Blutsauger und Insekten abzuwehren"},
{q:"Was passiert, wenn eine Schnecke langsam über die scharfe Kante einer Rasierklinge kriecht?",a:"Ihre Schleimschicht schützt sie, sie bleibt unverletzt"},
{q:"Woraus bestehen die gefährlichen Hörner von Nashörnern wirklich?",a:"Aus eng verklebten Haaren"},
{q:"Was benutzten viele alte Römer morgens ironischerweise zur Zahnreinigung?",a:"Urin"},
{q:"Welches kleine Beuteltier hinterlässt würfelförmige Hinterlassenschaften?",a:"Der Wombat"},
{q:"Woraus wurde klassischer roter Farbstoff für Lippenstift oder Kleidung oft gewonnen?",a:"Aus getrockneten, zerquetschten Schildläusen"},
{q:"Worüber können Bäume in einem Wald Nährstoffe und Botschaften austauschen?",a:"Über ein unterirdisches, weitläufiges Pilznetzwerk"},
{q:"Wie verhalten sich Faultiere sehr speziell, wenn sie ihr großes Geschäft verrichten?",a:"Sie klettern den ganzen Baum hinab und vergraben es am Boden"},
{q:"Woraus wurden die allerersten künstlichen Weihnachtsbäume in Deutschland gebastelt?",a:"Aus grün eingefärbten Gänsefedern"},
{q:"Welchen kuriosen Trick nutzen Krähen im Stadtverkehr, um harte Nüsse zu knacken?",a:"Sie legen sie auf die Straße, damit Autos darüberrollen"},
{q:"Was tun Delfine, damit sie beim Schlafen im Wasser nicht aus Versehen ertrinken?",a:"Sie schalten immer nur eine Gehirnhälfte ab"},
{q:"Womit fangen Schlangen Duftstoffe aus der Luft ein?",a:"Mit ihrer gespaltenen Zunge"},
{q:"Was versteckt sich unter dem dichten weißen Fell eines Eisbären?",a:"Komplett schwarze Haut"},
{q:"Womit hören Heuschrecken den Gesang ihrer Artgenossen?",a:"Mit Ohren, die an ihren Beinen sitzen"},
{q:"Wonach duftet das Fell des Binturong (Marderbär) für viele Menschen nachweislich?",a:"Nach frischem Popcorn"},
{q:"Was passiert mit Pinguinen, die zu viel nasses Gefieder putzen?",a:"Sie schlucken oft zu viel Federn, die sie dann wie Haarballen hochwürgen"},
{q:"Was tun viele Fische, wenn sie sich nach dem Schlaf strecken?",a:"Sie gähnen ausgiebig wie Menschen"},
{q:"Was haben Flamingos an sich, um ihre typisch rosa Farbe zu bekommen?",a:"Sie verfärben sich durch ihre Nahrung wie kleine Krebse"},
{q:"Wieso schnurren Katzen nicht nur, wenn sie sich wohlfühlen?",a:"Es dient auch der Selbstheilung und Schmerzlinderung"},
{q:"Wie erkennen sich Pinguin-Paare in riesigen Kolonien brüllender Artgenossen wieder?",a:"Durch den individuellen Klang der Stimme"},
{q:"Wieso rollt sich der Igel bei drohender Gefahr sofort zu einer Kugel zusammen?",a:"Um seine weiche Bauchseite vor Raubtieren zu schützen"},
{q:"Was ist die primäre Funktion der dichten Mähne bei männlichen Löwen?",a:"Schutz des Halses vor tödlichen Bissen im Kampf"},
{q:"Warum niesen Marineiguanas (Meerechsen) auf den Galapagos oft wütend wirkend vor sich hin?",a:"Sie spucken das überschüssige Meerwassersalz aus"},
{q:"Wie schläft der Koala meistens am liebsten in seinem Eukalyptusbaum?",a:"Zusammengekauert und festgekrallt an einer Astgabel"},
{q:"Was passiert, wenn ein Seestern versehentlich einen Arm verliert?",a:"Er wächst ihm mit der Zeit einfach nach"},
{q:"Was macht der archerfish (Schützenfisch), wenn er hungrig ist und Beute auf einem Blatt sieht?",a:"Er spuckt einen gezielten Wasserstrahl, um sie herunterzuschießen"},
{q:"Was bedeutet es meistens, wenn Hunde ein Bein heben, das aber beim Pinkeln nicht nötig wäre?",a:"Es dient dazu, ihre Duftmarke möglichst hoch und imposant zu setzen"}
];

// ═══════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════
let sb = null; // supabase client
let myId = localStorage.getItem('rv_myid') || crypto.randomUUID().slice(0,8);
localStorage.setItem('rv_myid', myId);
let myName = localStorage.getItem('rv_name') || '';
let room = null;
let screen = 'home';
let error = '';
let myAnswer = '';
let submitted = false;
let maxRounds = 6;
let subscription = null;

// ═══════════════════════════════════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════════════════════════════════
function initSupabase() {
  const url = 'https://mfpenavzuseykmhlnuvm.supabase.co';
  const key = 'sb_publishable_0X64H7f4OLwgEOC816TzQQ_geqMhqTh';
  sb = supabase.createClient(url, key);
  return true;
}

async function saveRoom(state) {
  if (!sb) return;
  state.updated_at = new Date().toISOString();
  const { error: e } = await sb.from('game_rooms').upsert({ code: state.roomCode, state: state, updated_at: state.updated_at });
  if (e) console.error('Save error:', e);
}

async function loadRoom(code) {
  if (!sb) return null;
  const { data, error: e } = await sb.from('game_rooms').select('state').eq('code', code).single();
  if (e || !data) return null;
  return data.state;
}

function subscribeToRoom(code) {
  if (subscription) subscription.unsubscribe();
  subscription = sb.channel(`room-${code}`)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'game_rooms', filter: `code=eq.${code}` }, (payload) => {
      if (payload.new && payload.new.state) {
        room = payload.new.state;
        render();
      }
    })
    .subscribe();
}

// ═══════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════
function genCode() { return "FISH"; }

function shuffle(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]} return b; }
const FISH_EMOJI = ["🐟","🐡","🦈","🐠","🐙","🦑","🦀","🐳","🐋","🦞"];

function setupRound(r) {
  const ri = r.currentRaterIndex % r.players.length;
  const nonR = r.players.filter((_,i) => i !== ri);
  const bi = Math.floor(Math.random() * nonR.length);
  const fa = {};
  nonR.forEach((p,i) => fa[p.id] = i === bi ? 'blue' : 'red');
  r.roundPoints = {};
  r.players.forEach(p => r.roundPoints[p.id] = 0);
  r.phase='guessing'; r.currentRaterIndex=ri; r.bluePlayerId=nonR[bi].id;
  r.fishAssign=fa; r.answerOrder=shuffle(nonR.map(p=>p.id)); r.flipped=[]; r.revealedAnswer=false;
  r.roundStartTime = Date.now();
}

// ═══════════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════════
async function doCreateRoom() {
  if (!myName) { error='Name eingeben!'; screen='home'; render(); return; }
  const code = genCode();
  room = {
    roomCode:code, hostId:myId, players:[{id:myId,name:myName,score:0}],
    phase:'lobby', currentRaterIndex:0, currentQuestionIndex:0,
    questionOrder:shuffle(QS.map((_,i)=>i)), answers:{}, answerOrder:[],
    flipped:[], bluePlayerId:null, fishAssign:{}, roundsPlayed:0, maxRounds
  };
  await saveRoom(room);
  subscribeToRoom(code);
  screen='lobby'; error=''; render();
}

async function doQuickJoin() {
  const n = document.getElementById('nameInput')?.value?.trim() || myName;
  if (!n) { error='Name eingeben!'; render(); return; }
  myName = n; localStorage.setItem('rv_name', n);
  const c = "FISH";
  let r = await loadRoom(c);
  if (!r) {
    // Create room if it doesn't exist
    room = {
      roomCode:c, hostId:myId, players:[{id:myId,name:myName,score:0}],
      phase:'lobby', currentRaterIndex:0, currentQuestionIndex:0,
      questionOrder:shuffle(QS.map((_,i)=>i)), answers:{}, answerOrder:[],
      flipped:[], bluePlayerId:null, fishAssign:{}, roundsPlayed:0, maxRounds:6
    };
    await saveRoom(room);
    subscribeToRoom(c);
    screen='lobby'; error=''; render();
    return;
  }
  if (r.phase !== 'lobby' && !r.players.find(p=>p.id===myId)) { error='Spiel läuft schon!'; render(); return; }
  if (!r.players.find(p=>p.id===myId)) {
    if (r.players.length>=12) { error='Raum voll!'; render(); return; }
    r.players.push({id:myId,name:n,score:0});
    await saveRoom(r);
  }
  room = r; subscribeToRoom(c);
  screen='lobby'; error=''; render();
}

async function doStartGame() {
  if (!room||room.players.length<3) { error='Mindestens 3 Spieler!'; render(); return; }
  room.maxRounds = maxRounds;
  room.phase = 'rules';
  await saveRoom(room); render();
}

async function doStartFirstRound() {
  const r = await loadRoom(room.roomCode);
  setupRound(r);
  await saveRoom(r); room=r; render();
}

async function doBankPoints() {
  const r = await loadRoom(room.roomCode);
  const raterId = r.players[r.currentRaterIndex].id;
  const rater = r.players.find(p=>p.id===raterId);
  if (rater) rater.score += (r.roundPoints[raterId] || 0);
  r.phase='roundEnd'; r.revealedAnswer=true;
  await saveRoom(r); room=r; render();
}

async function doFlip(pid) {
  const r = await loadRoom(room.roomCode);
  if (r.flipped.includes(pid)) return;
  r.flipped.push(pid);
  const raterId = r.players[r.currentRaterIndex].id;

  if (pid===r.bluePlayerId) {
    // Wahres Schwindelfisch aufgedeckt! 0 Punkte für diese Runde.
    r.roundPoints[raterId] = 0;
    r.phase='roundEnd'; r.revealedAnswer=true;
  } else {
    // Falschen Schwindelfisch aufgedeckt -> +1 Punkt!
    r.roundPoints[raterId] = (r.roundPoints[raterId] || 0) + 1;
    const rater = r.players.find(p=>p.id===raterId);
    const reds = r.players.filter(p=>p.id!==raterId&&p.id!==r.bluePlayerId);
    
    // Sind alle falschen Schwindelfische entlarvt?
    if(reds.every(p=>r.flipped.includes(p.id))) {
      if (rater) rater.score += (r.roundPoints[raterId] || 0);
      r.phase='roundEnd'; r.revealedAnswer=true;
    }
  }
  await saveRoom(r); room=r; render();
}

async function doNextRound() {
  const r = await loadRoom(room.roomCode);
  r.roundsPlayed++; r.currentQuestionIndex++; r.currentRaterIndex=(r.currentRaterIndex+1)%r.players.length;
  if (r.roundsPlayed>=r.maxRounds||r.currentQuestionIndex>=r.questionOrder.length) { r.phase='gameOver'; }
  else setupRound(r);
  await saveRoom(r); room=r; submitted=false; render();
}

async function doRestart() {
  const r = await loadRoom(room.roomCode);
  r.players.forEach(p=>p.score=0); r.roundsPlayed=0; r.currentRaterIndex=0; r.currentQuestionIndex=0;
  r.questionOrder=shuffle(QS.map((_,i)=>i)); r.phase='lobby';
  await saveRoom(r); room=r; submitted=false; render();
}

// ═══════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════
function render() {
  if (window.guessTimer) { clearTimeout(window.guessTimer); window.guessTimer = null; }
  const app = document.getElementById('app');
  const me = room?.players?.find(p=>p.id===myId);
  const isHost = room?.hostId===myId;
  const isRater = room ? room.players[room.currentRaterIndex]?.id===myId : false;
  const Q = room ? QS[room.questionOrder[room.currentQuestionIndex]] : null;
  const myFish = room?.fishAssign?.[myId];

  // ── HOME ──
  if (screen==='home') {
    app.innerHTML = `
      <div class="center mt-24"><div class="emoji-big">🐟</div>
      <h1 style="font-size:28px;font-weight:900;letter-spacing:-1px">SCHWINDEL<br/>FISCH</h1>
      <p style="color:var(--teal);font-size:13px;margin-top:8px;font-weight:600;letter-spacing:2px">DAS BLUFF-SPIEL</p></div>
      <div class="card" style="margin-top:20px">
        <input id="nameInput" placeholder="Dein Name" value="${myName}" maxlength="20"/>
        ${error?`<p class="error">${error}</p>`:''}
        <button class="btn btn-teal" onclick="doQuickJoin()">Spiel beitreten</button>
      </div>
      <div class="game-footer">
        <div class="label" style="font-size:9px;color:rgba(255,255,255,0.2);margin-bottom:8px">Beta-Tester</div>
        <div class="beta-list">Vincent Charlotte Fritz Julia Felix Philipp Filippa Ben Paulina Alina Juno Julia Tom</div>
      </div>`;
    return;
  }

  // ── CREATE SETTINGS ──
  if (screen==='create') {
    const rndBtns = [4,6,8,10,12].map(n=>`<button onclick="maxRounds=${n};render()" style="width:44px;height:44px;border-radius:10px;border:none;font-size:16px;font-weight:800;background:${maxRounds===n?'var(--teal)':'var(--surface)'};color:var(--white);cursor:pointer;font-family:inherit">${n}</button>`).join('');
    app.innerHTML = `
      <div class="center mt-32"><div class="emoji-med">⚙️</div><h2 style="font-size:22px;font-weight:800;margin:12px 0">Einstellungen</h2></div>
      <div class="card">
        <label class="small" style="font-weight:700;color:var(--teal)">Rundenanzahl</label>
        <div style="display:flex;gap:12px;margin-top:8px">${rndBtns}</div>
        <button class="btn btn-teal" onclick="doCreateRoom()">Raum erstellen →</button>
        <button class="btn btn-surface" onclick="screen='home';render()">← Zurück</button>
      </div>`;
    return;
  }

  if (!room) { app.innerHTML = '<p class="center mt-32 pulse">Lade...</p>'; return; }

  // ── LOBBY ──
  if (room.phase==='lobby') {
    const rows = room.players.map((p,i)=>`
      <div class="player-row" style="${p.id===myId?'background:#1abc9c22':''}">
        <span style="font-size:22px">${FISH_EMOJI[i]||'🐟'}</span>
        <span style="font-weight:700;flex:1">${p.name}${p.id===myId?' (du)':''}</span>
        ${p.id===room.hostId?'<span class="tag" style="background:var(--gold);color:var(--ocean)">HOST</span>':''}
      </div>`).join('');
    const startBtn = isHost && room.players.length>=3 ? `<button class="btn btn-teal" onclick="doStartGame()">Spiel starten! 🎣</button>` :
      isHost ? `<p class="small center error" style="margin-top:12px">Mindestens 3 Spieler nötig</p>` :
      `<p class="small center muted" style="margin-top:12px">Warte auf den Host...</p>`;
    app.innerHTML = `
      <div class="center mt-32">
        <h2 style="font-weight:900;color:var(--gold)">LOBBY</h2>
        <p class="small muted">Alle zusammen im selben Raum</p>
      </div>
      <div class="card mt-16">
        <div class="small mb-12" style="font-weight:700;color:var(--teal)">SPIELER (${room.players.length}/12)</div>
        ${rows}${startBtn}
      </div>
      <div class="game-footer">
        <div class="label" style="font-size:9px;color:rgba(255,255,255,0.2);margin-bottom:8px">Beta-Tester</div>
        <div class="beta-list">Vincent Charlotte Fritz Julia Felix Philipp Filippa Ben Paulina Alina Juno Julia Tom</div>
      </div>`;
    return;
  }

  // ── RULES ──
  if (room.phase === 'rules') {
    app.innerHTML = `
      <div class="game-header">
        <span class="small" style="font-weight:800;color:var(--teal)">REGELN</span>
        <span class="small" style="font-weight:800;color:var(--gold)">STARTING...</span>
      </div>
      <div class="card" style="border-color:var(--gold)44">
        <p style="font-size:16px;font-weight:700;margin-bottom:12px;color:var(--teal)">So funktioniert's:</p>
        <ul style="text-align:left;line-height:1.6;font-size:15px;margin-bottom:24px;padding-left:20px;color:#ffffffcc">
          <li style="margin-bottom:8px">Ein Spieler ist in der jeweiligen Runde der <b>Rate-Meister</b> und liest die Frage von seinem Handy allen vor.</li>
          <li style="margin-bottom:8px">Alle anderen erhalten parallel heimlich ihre Rolle auf ihrem eigenen Handy angezeigt. Einer ist der <b>Wahre Schwindelfisch</b> (kennt die wahre Antwort), die anderen sind <b>Falsche Schwindelfische</b> (sind Lügner und müssen sich spontan eine falsche Antwort ausdenken).</li>
          <li style="margin-bottom:8px">Jeder spricht nacheinander (ganz normal mündlich im Raum) seine Antwort laut aus.</li>
          <li style="margin-bottom:8px">Muss der Rate-Meister tippen, wer gelogen hat, und auf seinem eigenen Handy deren Buttons antippen. Jeder entlarvte Falsche Schwindelfisch bringt <b>dem Rate-Meister 1 Punkt</b>! Alle anderen bekommen in diesem Spiel generell keine Punkte.</li>
          <li><b>Aber Achtung:</b> Deckt der Rate-Meister aus Versehen den einzigen Wahren Schwindelfisch auf, verliert der Rate-Meister <b>alle seine Punkte aus dieser angefangenen Runde</b> und sie ist sofort beendet! Er kann aber frühzeitig "Punkte sichern", um kein Risiko mehr einzugehen.</li>
        </ul>
        ${isHost ? `<button class="btn btn-gold" onclick="doStartFirstRound()">Alles klar &ndash; Spiel beginnen!</button>` : `<div class="small muted center" style="margin-top:12px">Lest in Ruhe die Regeln. Warte auf den Host...</div>`}
      </div>
      <div class="game-footer">
        <div class="beta-list">Vincent Charlotte Fritz Julia Felix Philipp Filippa Ben Paulina Alina Juno Julia Tom</div>
      </div>
    `;
    return;
  }

  // ── GUESSING ──
  if (room.phase==='guessing') {
    const elapsed = Math.floor((Date.now() - (room.roundStartTime || Date.now())) / 1000);
    const left = Math.max(0, 20 - elapsed);
    if (left > 0) window.guessTimer = setTimeout(render, 1000);
    const firstSpeakerId = room.answerOrder[0];
    const firstSpeaker = room.players.find(x=>x.id===firstSpeakerId);

    const rater = room.players[room.currentRaterIndex];
    const headerHtml = `
      <div class="game-header">
        <span class="small" style="font-weight:800;color:var(--teal)">RUNDE ${room.roundsPlayed + 1}/${room.maxRounds}</span>
        <span class="small" style="font-weight:800;color:var(--gold)">SCORE: ${me?.score || 0}${isRater && (room.roundPoints[myId] > 0) ? ` (+${room.roundPoints[myId]})` : ''}</span>
      </div>`;

    const timerHtml = left > 0 
      ? `<div style="background:#00000044;border-radius:12px;padding:16px;margin:16px 0;text-align:center">
           <div class="tiny" style="color:var(--teal);margin-bottom:8px;font-weight:700">BEDENKZEIT VOR DEM ERSTEN SPRECHER</div>
           <div style="font-size:36px;font-weight:900;color:var(--gold)">${left}s</div>
         </div>`
      : `<div style="background:#1abc9c22;border:1px solid var(--teal);border-radius:12px;padding:16px;margin:16px 0;text-align:center">
           <div class="tiny" style="color:var(--teal);margin-bottom:8px;font-weight:700">ZEIT ABGELAUFEN!</div>
           <div style="font-size:16px;font-weight:700">Erster Sprecher: <span style="color:var(--gold);font-size:20px;display:block;margin-top:4px">${firstSpeaker?.name}</span></div>
         </div>`;

    const btns = room.answerOrder.map(pid => {
      const p = room.players.find(x=>x.id===pid);
      if (!p) return '';
      const fl = room.flipped.includes(pid);
      const isRed = fl && pid!==room.bluePlayerId;
      const isBlue = fl && pid===room.bluePlayerId;
      const cls = isBlue?'flipped-blue':isRed?'flipped-red':'';
      const icon = fl?(isBlue?'🐟':'🐡'):'❓';
      const tag = isRed?'<span class="fish-badge" style="background:var(--red)">FAKE</span>':isBlue?'<span class="fish-badge" style="background:var(--blue)">ECHT</span>':'';
      const disabled = fl || !isRater || left > 0;
      return `<button class="answer-btn ${cls}" ${disabled?'disabled':''} onclick="doFlip('${pid}')">
        <span style="font-size:24px;min-width:32px">${icon}</span>
        <div style="flex:1"><div style="font-weight:700">${p.name}${pid===myId?' (du)':''}</div></div>${tag}</button>`;
    }).join('');

    if (isRater) {
      app.innerHTML = `
        ${headerHtml}
        <div class="center mt-12">
          <div class="label" style="color:var(--gold)">DU BIST DER RATE-MEISTER</div>
          <p style="font-size:18px;font-weight:700;line-height:1.4;margin:12px 0">${Q?.q}</p>
        </div>
        ${timerHtml}
        <div class="card mt-16" style="opacity:${left>0?'0.5':'1'}">
          <div class="tiny muted mb-12 center">Tippe auf die Lügner:</div>
          ${btns}
          ${room.flipped.length > 0 ? `<button class="btn btn-gold" onclick="doBankPoints()">Punkte sichern (+${room.roundPoints[myId] || 0})</button>` : ''}
        </div>`;
    } else {
      const col = myFish==='blue' ? 'var(--blue)' : 'var(--red)';
      app.innerHTML = `
        ${headerHtml}
        <div class="center mt-12">
          <div class="label" style="color:${col}">${myFish==='blue'?'🐟 DU BIST DER WAHRE SCHWINDELFISCH':'🐡 DU BIST EIN FALSCHER SCHWINDELFISCH'}</div>
        </div>
        <div class="card" style="border-color:${col}44">
          <div class="small mb-8" style="font-weight:700;color:var(--teal)">FRAGE</div>
          <p style="font-size:17px;font-weight:700;line-height:1.4;margin-bottom:12px">${Q?.q}</p>
          <div class="answer-box" style="background:${myFish==='blue'?'#3498db22':'#e74c3c22'}">
            <div class="tiny" style="font-weight:700;color:${col};margin-bottom:4px">${myFish==='blue'?'✅ DIE RICHTIGE ANTWORT:':'❌ NICHT VERWENDEN (Reale Antwort):'}</div>
            <p style="font-size:16px;font-weight:${myFish==='blue'?900:400};color:var(--gold);${myFish==='red'?'text-decoration:line-through;opacity:0.8':''}">${Q?.a}</p>
          </div>
          ${timerHtml}
          <p class="small muted center">${myFish==='blue'?'Sag die richtige Antwort <b>ganz selbstbewusst laut</b>, wenn du dran bist!':'Denk dir <b>schnell eine falsche Antwort</b> aus und sag sie in die Runde!'}</p>
        </div>
        <div class="game-footer">
          <div class="beta-list">Vincent Charlotte Fritz Julia Felix Philipp Filippa Ben Paulina Alina Juno Julia Tom</div>
        </div>`;
    }
    return;
  }

  // ── ROUND END ──
  if (room.phase==='roundEnd') {
    const rater = room.players[room.currentRaterIndex];
    const bp = room.players.find(p=>p.id===room.bluePlayerId);
    const blueFlipped = room.flipped.includes(room.bluePlayerId);
    const sorted = [...room.players].sort((a,b)=>b.score-a.score);
    const rows = sorted.map((p,i)=>`
      <div class="score-row" style="${i===0?'background:#f1c40f15':''}">
        <span style="font-weight:900;font-size:16px;color:${i===0?'var(--gold)':'#ffffff44'};min-width:24px">${i+1}.</span>
        <span style="flex:1;font-weight:600">${p.name}${p.id===myId?' (du)':''}</span>
        <span style="font-weight:900;font-size:18px;color:var(--gold)">${p.score}</span>
      </div>`).join('');

    app.innerHTML = `
      <div class="center mt-24"><div style="font-size:44px">${blueFlipped?'💥':'🎯'}</div>
      <h2 style="font-size:20px;font-weight:800;margin:8px 0">${blueFlipped?rater?.name+' hat den Wahren Schwindelfisch erwischt!':rater?.name+' hat alle Fälscher entlarvt!'}</h2></div>
      <div class="card mt-12">
        <div class="small mb-8" style="font-weight:700;color:var(--teal)">RICHTIGE ANTWORT</div>
        <p style="font-size:17px;font-weight:700;color:var(--gold);margin-bottom:4px">${Q?.a}</p>
        <p class="small muted">Wahrer Schwindelfisch: ${bp?.name}</p></div>
      <div class="card mt-12">
        <div class="small mb-8" style="font-weight:700;color:var(--teal)">PUNKTESTAND (Runde ${room.roundsPlayed+1}/${room.maxRounds})</div>
        ${rows}</div>
      ${isHost?`<button class="btn btn-teal" style="max-width:400px;margin-top:12px" onclick="doNextRound()">${room.roundsPlayed+1>=room.maxRounds?'Ergebnis anzeigen →':'Nächste Runde →'}</button>`
        :`<p class="small muted center mt-16">Host startet nächste Runde...</p>`}`;
    return;
  }

  // ── GAME OVER ──
  if (room.phase==='gameOver') {
    const sorted = [...room.players].sort((a,b)=>b.score-a.score);
    const medals = ['🥇','🥈','🥉'];
    const rows = sorted.map((p,i)=>`
      <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;margin-bottom:6px;${i===0?'background:#f1c40f22;border:1px solid #f1c40f44':i<3?'background:#1abc9c11':''}">
        <span style="font-size:28px;min-width:36px;text-align:center">${medals[i]||(i+1)+'.'}</span>
        <span style="flex:1;font-weight:700;font-size:16px">${p.name}${p.id===myId?' (du)':''}</span>
        <span style="font-weight:900;font-size:22px;color:var(--gold)">${p.score}</span>
      </div>`).join('');

    app.innerHTML = `
      <div class="center mt-32"><div style="font-size:56px">🏆</div>
      <h1 style="font-size:26px;font-weight:900;margin:8px 0">Spiel vorbei!</h1>
      <p style="color:var(--gold);font-weight:700;font-size:18px">${sorted[0]?.name} gewinnt!</p></div>
      <div class="card mt-16">${rows}</div>
      ${isHost?`<button class="btn btn-teal" style="max-width:400px;margin-top:16px" onclick="doRestart()">🔄 Nochmal spielen</button>`:''}`;
    return;
  }

  app.innerHTML = '<p class="center mt-32 pulse">Lade...</p>';
}

// ═══════════════════════════════════════════════════════════════════
// GLOBAL HANDLERS
// ═══════════════════════════════════════════════════════════════════
window.goCreate = () => {
  const n = document.getElementById('nameInput')?.value?.trim();
  if (!n) { error='Name eingeben!'; render(); return; }
  myName = n; localStorage.setItem('rv_name', n);
  screen='create'; error=''; render();
};
window.doCreateRoom = doCreateRoom;
window.doQuickJoin = doQuickJoin;
window.doStartGame = doStartGame;
window.doStartFirstRound = doStartFirstRound;
window.doBankPoints = doBankPoints;
window.doFlip = doFlip;
window.doNextRound = doNextRound;
window.doRestart = doRestart;
window.maxRounds = maxRounds;

// ── INIT ──
initSupabase();
render();
</script>

</body>
</html>
